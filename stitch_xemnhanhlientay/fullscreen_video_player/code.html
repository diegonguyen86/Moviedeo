            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body-md overflow-hidden h-screen w-screen selection:bg-primary/30">
<!-- Fullscreen Video Background Content -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A panoramic cinematic still from an epic medieval fantasy series. High-contrast lighting illuminates a rugged warrior standing on a cliffside overlooking a vast, misty valley at twilight. The sky is a deep indigo with streaks of violet and embers from a distant fire. The visual style is premium and atmospheric, matching a dark cinematic aesthetic with sharp details and a moody, immersive color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhoI4aJSQ2nqtFF2_AZxizLy0YfdPnx5YQXUMFc3G4A0-d-an2fzdSdABN28_3Zht-mCiS2BMzZPsKNOCLejIOb_pl4v7DN58cH5UIO3dHqiAm-S3lFY7DDKhmt-BPdMIPfZ5zyTSmQoxBHRlHa-ZQg-Cmh9LSq6tdCg_EVaJcCsl1-X1ip3sIzkNyL4Sh6Y7ViHDVjQiOuW3G579-mK4MlKdDwmGQJFL7hRw8cwjzizPYBU47od2qGtaUc7BL4_mpn5gE3e7no9w"/>
</div>
<!-- UI Overlay Layer -->
<div class="relative z-10 flex flex-col justify-between h-full">
<!-- Top Controls (Back & Title) -->
<header class="player-gradient-top px-margin-x pt-10 pb-20 flex items-center gap-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-hover-glow transition-all active:scale-90">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline-lg text-headline-lg text-text-primary tracking-tight">Vương Quốc Cuối Cùng</h1>
<p class="font-label-md text-label-md text-text-secondary">Season 4 • Episode 7 • The Battle of Wessex</p>
</div>
</header>
<!-- Center Interactive Region (Subtitles/Speed Panels) -->
<main class="flex-grow flex items-center justify-center px-margin-x relative">
<!-- Subtitle Selection (Floating Left) -->
<div class="absolute left-margin-x bottom-40 w-64 glass-panel rounded-xl p-4 flex flex-col gap-2 shadow-2xl">
<div class="flex items-center gap-2 mb-2 px-2">
<span class="material-symbols-outlined text-primary text-sm">subtitles</span>
<span class="font-label-md text-text-primary">Subtitles</span>
</div>
<button class="flex items-center justify-between px-3 py-2 rounded-lg bg-primary/20 text-primary border border-primary/30">
<span class="font-label-md">Tiếng Việt</span>
<span class="material-symbols-outlined text-xs">check</span>
</button>
<button class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-surface-glass text-text-secondary transition-colors">
<span class="font-label-md">English (CC)</span>
</button>
<button class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-surface-glass text-text-secondary transition-colors">
<span class="font-label-md">Off</span>
</button>
</div>
<!-- Playback Speed (Floating Right) -->
<div class="absolute right-margin-x bottom-40 w-48 glass-panel rounded-xl p-4 flex flex-col gap-2 shadow-2xl">
<div class="flex items-center gap-2 mb-2 px-2">
<span class="material-symbols-outlined text-primary text-sm">speed</span>
<span class="font-label-md text-text-primary">Playback Speed</span>
</div>
<button class="px-3 py-2 rounded-lg hover:bg-surface-glass text-text-secondary font-label-md text-left">0.75x</button>
<button class="px-3 py-2 rounded-lg bg-primary/20 text-primary border border-primary/30 font-label-md text-left flex justify-between">
<span>1.0x (Normal)</span>
<span class="material-symbols-outlined text-xs">check</span>
</button>
<button class="px-3 py-2 rounded-lg hover:bg-surface-glass text-text-secondary font-label-md text-left">1.25x</button>
<button class="px-3 py-2 rounded-lg hover:bg-surface-glass text-text-secondary font-label-md text-left">1.5x</button>
</div>
<!-- Large Center Play State Indicator (Optional) -->
<div class="w-24 h-24 rounded-full glass-panel flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity cursor-pointer shadow-hover-glow">
<span class="material-symbols-outlined text-text-primary text-5xl fill-icon" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</main>
<!-- Bottom Controls & Timeline -->
<footer class="player-gradient-bottom px-margin-x pb-12 pt-24 space-y-8">
<!-- Progress Bar Section -->
<div class="relative group progress-bar-hover cursor-pointer">
<!-- Timeline Track -->
<div class="h-1.5 w-full bg-surface-glass rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary relative shadow-[0_0_15px_rgba(199,191,255,0.5)]"></div>
</div>
<!-- Interactive Thumb -->
<div class="thumb absolute left-1/3 top-1/2 -translate-y-1/2 -translate-x-1/2 w-4 h-4 bg-text-primary rounded-full shadow-[0_0_12px_#8F88C7] opacity-0 transition-opacity duration-200"></div>
<!-- Time Labels -->
<div class="flex justify-between mt-3 font-label-sm text-text-secondary tracking-widest">
<span>14:32</span>
<span>42:15</span>
</div>
</div>
<!-- Main Control Bar -->
<div class="flex items-center justify-between">
<!-- Left: Playback Controls -->
<div class="flex items-center gap-8">
<button class="group active:scale-90 transition-transform">
<span class="material-symbols-outlined text-text-primary text-4xl group-hover:text-primary transition-colors">replay_10</span>
</button>
<button class="w-16 h-16 rounded-full glass-panel flex items-center justify-center hover:bg-hover-glow transition-all hover:translate-y-[-4px] active:scale-90 shadow-lg">
<span class="material-symbols-outlined text-text-primary text-4xl fill-icon" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="group active:scale-90 transition-transform">
<span class="material-symbols-outlined text-text-primary text-4xl group-hover:text-primary transition-colors">forward_10</span>
</button>
<!-- Volume Control -->
<div class="flex items-center gap-4 ml-4 group">
<button class="active:scale-90 transition-transform">
<span class="material-symbols-outlined text-text-secondary group-hover:text-text-primary">volume_up</span>
</button>
<div class="w-24 h-1 bg-surface-glass rounded-full overflow-hidden">
<div class="w-3/4 h-full bg-text-primary group-hover:bg-primary transition-colors"></div>
</div>
</div>
</div>
<!-- Right: Utility Controls -->
<div class="flex items-center gap-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-glass transition-colors active:scale-90">
<span class="material-symbols-outlined text-text-secondary hover:text-text-primary">settings</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-glass transition-colors active:scale-90">
<span class="material-symbols-outlined text-text-secondary hover:text-text-primary">picture_in_picture_alt</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-glass transition-colors active:scale-90">
<span class="material-symbols-outlined text-text-secondary hover:text-text-primary">fullscreen</span>
</button>
</div>
</div>
</footer>
</div>
<!-- Active Indicator Overlay (Subtle Glow at bottom center) -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[600px] h-32 bg-primary/10 blur-[120px] pointer-events-none z-0"></div>
